<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 灵动岛模拟器</title>
    <style>
        :root {
            --light-angle: 145deg;
            --shadow-offset-x: 5px;
            --shadow-offset-y: 5px;
            --glass-bg: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
            --glass-blur: 20px;
            --iphone-width: 320px;
            --iphone-height: 650px;
            --iphone-radius: 35px;
            --island-initial-width: 90px;
            --island-initial-height: 28px;
            --island-expanded-width: 200px;
            --island-detailed-width: 280px;
            --island-detailed-height: 120px;
            --home-wallpaper: linear-gradient(135deg, #09203F, #537895);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        *:focus, *:active {
            outline: none !important;
            box-shadow: none !important;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .glass {
            background: linear-gradient(var(--light-angle), rgba(255,255,255,0.25), rgba(255,255,255,0.05));
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 var(--shadow-offset-y) var(--shadow-offset-x) rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .iphone-device {
            position: relative;
            width: var(--iphone-width);
            height: var(--iphone-height);
            border-radius: var(--iphone-radius);
            padding: 12px;
            background: linear-gradient(145deg, #a0a0a0, #d0d0d0);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: visible;
        }

        /* 侧边按键 */
        .left-buttons {
            position: absolute;
            left: -4px;
            top: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 9999 !important;
            pointer-events: auto;
        }
        .side-button {
            width: 6px;
            height: 50px;
            border-radius: 3px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            transition: all 0.1s ease;
        }
        .side-button:active {
            transform: translateX(2px);
            opacity: 0.8;
        }

        .right-button {
            position: absolute;
            right: -4px;
            top: 180px;
            width: 6px;
            height: 70px;
            border-radius: 3px;
            cursor: pointer;
            z-index: 9999 !important;
            pointer-events: auto;
            background: rgba(255,255,255,0.3);
            transition: all 0.1s ease;
        }
        .right-button:active {
            transform: translateX(-2px);
            opacity: 0.8;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            border-radius: calc(var(--iphone-radius) - 8px);
            background: #000;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            z-index: 1;
        }
        .iphone-screen.screen-off {
            background: #000 !important;
        }

        .home-screen {
            width: 100%;
            height: 100%;
            padding: 55px 20px 20px;
            display: flex;
            flex-direction: column;
            background: var(--home-wallpaper);
            background-size: cover;
            background-position: center;
        }

        /* 灵动岛 + 隐藏摄像头占位 */
        .dynamic-island {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: var(--island-initial-width);
            height: var(--island-initial-height);
            border-radius: calc(var(--island-initial-height)/2);
            background: #000;
            z-index: 100;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }
        /* 隐藏摄像头占位，内容自动避让 */
        .camera-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #000;
            z-index: 101;
        }
        .dynamic-island.expanded {
            width: var(--island-expanded-width);
            border-radius: 18px;
        }
        .dynamic-island.detailed {
            width: var(--island-detailed-width);
            height: var(--island-detailed-height);
            border-radius: 25px;
            padding: 12px;
        }

        .island-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            color: #fff;
            font-size: 12px;
        }
        .island-app-icon { font-size: 14px; }
        .island-app-info { flex:1; margin-left:8px; overflow: hidden; }
        .island-app-title { font-weight:600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .island-app-desc { font-size:10px; opacity:0.8; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap:15px;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .app-icon-emoji {
            width:55px; height:55px; border-radius:12px;
            display: flex; align-items:center; justify-content:center;
            font-size:30px; margin-bottom:5px;
        }
        .app-name { color:#fff; font-size:12px; text-align:center; }

        .app-container {
            width:100%; height:100%;
            background:#fff;
            position:absolute; top:0; left:0; z-index:50;
            display:flex; flex-direction:column;
        }
        .app-header {
            height:50px; display:flex; align-items:center; padding:0 15px;
            color:#fff; font-weight:600;
        }
        .app-content { flex:1; background:#f2f2f7; }
        iframe { width:100%; height:100%; border:none; }

        /* 底部小黑条 */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            z-index: 200;
            cursor: pointer;
        }

        /* 后台多任务 */
        .app-switcher {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 70;
            display: none;
            padding: 60px 10px 80px;
        }
        .app-switcher.show { display: block; }
        .switcher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            height: 100%;
        }
        .switcher-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .switcher-close {
            position: absolute;
            top: 6px; right: 6px;
            width: 22px; height: 22px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border-radius: 50%;
            display: flex; align-items:center; justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* 悬浮AI对话框（新增发送按钮） */
        .ai-float-dialog {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(20,20,20,0.9);
            border-radius: 20px;
            padding:12px 16px;
            z-index: 90;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .ai-float-dialog.show { display:flex; }
        .ai-float-input {
            flex: 1;
            padding:8px 12px;
            border-radius:16px;
            border:none;
            background: rgba(255,255,255,0.1);
            color:#fff;
            font-size:14px;
        }
        .ai-float-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        /* AI整页APP */
        .ai-full-app {
            width:100%; height:100%;
            position:absolute; top:0; left:0; z-index:60;
            background:#1a1a2e;
            color:#fff;
            padding:60px 16px 80px;
            display: none;
            flex-direction: column;
        }
        .ai-full-app.show { display:flex; }
        .ai-chat-history {
            flex:1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .ai-msg {
            max-width:80%;
            padding:8px 12px;
            border-radius:16px;
        }
        .ai-msg.user { align-self:end; background:#007aff; }
        .ai-msg.ai { align-self:start; background:rgba(255,255,255,0.1); }

        /* 设置 */
        .settings-list { padding:16px; }
        .settings-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom:1px solid #eee;
        }
        .settings-switch {
            width:50px; height:30px; background:#ccc; border-radius:15px; position:relative;
        }
        .settings-switch::after {
            content:''; width:26px; height:26px; background:#fff; border-radius:50%;
            position:absolute; top:2px; left:2px; transition:0.2s;
        }
        .settings-switch.on { background:#07c160; }
        .settings-switch.on::after { left:22px; }

        .wallpaper-option {
            width: 60px; height: 60px; border-radius: 12px; margin: 6px;
            cursor: pointer; border: 2px solid transparent;
        }
        .wallpaper-option.active { border-color: #007aff; }

        .progress-bar {
            width:100%; height:6px; background:#ddd; border-radius:3px; margin-top:6px; overflow:hidden;
        }
        .progress-fill { height:100%; background:#007aff; width:0%; transition: width 0.3s; }

        .hidden { display:none !important; }
    </style>
</head>
<body>

<div class="iphone-device glass">
    <!-- 左侧音量按键 -->
    <div class="left-buttons">
        <div class="volume-up side-button"></div>
        <div class="volume-down side-button"></div>
    </div>
    <!-- 右侧电源键 -->
    <div class="power-button right-button"></div>

    <div class="iphone-screen screen-off">
        <!-- 灵动岛（新增隐藏摄像头占位） -->
        <div class="dynamic-island">
            <div class="camera-placeholder"></div>
            <div class="island-content"></div>
        </div>

        <div class="home-screen hidden">
            <div class="app-grid"></div>
        </div>

        <div class="app-container hidden"></div>
        <div class="app-switcher"><div class="switcher-grid"></div></div>

        <!-- 悬浮AI对话框（新增发送按钮） -->
        <div class="ai-float-dialog">
            <input class="ai-float-input" placeholder="问松果AI..." />
            <button class="ai-float-send glass">↑</button>
        </div>

        <div class="ai-full-app"><div class="ai-chat-history"></div></div>

        <!-- 底部小黑条 -->
        <div class="home-indicator"></div>
    </div>
</div>

<script>
    let isPowerOn = false, isScreenOn = false, activeApp = null;
    let backgroundActivities = new Map();
    let appBackgroundList = [];
    let islandAutoCloseTimer = null;
    let aiFloatMode = false;
    let aiHistory = [];
    let homeSwipeCount = 0;
    let homeSwipeTimer;

    // 电源键点击计数
    let powerClickCount = 0;
    let powerClickTimer;

    const wallpapers = [
        { name: '深蓝', css: 'linear-gradient(135deg, #09203F, #537895)' },
        { name: '紫黑', css: 'linear-gradient(135deg, #24243E, #302B63)' },
        { name: '墨绿', css: 'linear-gradient(135deg, #1A2980, #26D0CE)' },
        { name: '暖橙', css: 'linear-gradient(135deg, #FF416C, #FF4B2B)' },
        { name: '暗黑', css: '#111' }
    ];

    const apps = {
        微信: { icon:"💬", color:"#07C160", always:true },
        相机: { icon:"📷", color:"#1C1C1E", always:true },
        相册: { icon:"🖼️", color:"#FF9500", always:true },
        设置: { icon:"⚙️", color:"#8E8E93", settings:true },
        Safari: { icon:"🌐", color:"#007AFF", web:true },
        音乐: { icon:"🎵", color:"#FF2D55", music:true },
        流体云: { icon:"☁️", color:"#4fa3ff", update:true },
        松果AI: { icon:"🤖", color:"#5856d6", ai:true },
    };

    window.addEventListener('DOMContentLoaded', () => {
        renderHomeScreen();
        updateDynamicIsland();
        bindEvents();
        
        // 点击空白关闭灵动岛
        document.querySelector('.iphone-screen').addEventListener('click', (e) => {
            if(!e.target.closest('.dynamic-island')) collapseIslandDetail();
        });
    });

    function bindEvents() {
        // 音量+按键
        document.querySelector('.volume-up').addEventListener('click', () => {
            if(!isPowerOn) return;
        });
        // 音量-按键
        document.querySelector('.volume-down').addEventListener('click', () => {
            if(!isPowerOn) return;
        });
        // 电源按键
        document.querySelector('.power-button').addEventListener('click', () => {
            powerClickCount++;
            clearTimeout(powerClickTimer);
            powerClickTimer = setTimeout(() => {
                if(powerClickCount === 1) singlePower();
                else if(powerClickCount === 2) doublePower();
                else if(powerClickCount >= 3) triplePower();
                powerClickCount = 0;
            }, 500);
        });

        // 灵动岛点击
        const island = document.querySelector('.dynamic-island');
        island.addEventListener('click', () => {
            if(backgroundActivities.size === 0) return;
            islandClickCount++;
            clearTimeout(islandClickTimer);
            islandClickTimer = setTimeout(() => {
                if(islandClickCount === 1){
                    const [app] = Array.from(backgroundActivities.entries()).pop();
                    openApp(app);
                }else{
                    toggleIslandDetail();
                }
                islandClickCount = 0;
            }, 350);
        });

        // 小黑条上滑逻辑
        const homeIndicator = document.querySelector('.home-indicator');
        homeIndicator.addEventListener('click', () => {
            const switcher = document.querySelector('.app-switcher');
            // 后台点小黑条直接退出
            if(switcher.classList.contains('show')){
                switcher.classList.remove('show');
                return;
            }
            // 原有逻辑
            if(activeApp) {
                closeAppToHome();
            } else {
                homeSwipeCount++;
                clearTimeout(homeSwipeTimer);
                homeSwipeTimer = setTimeout(() => {
                    if(homeSwipeCount >= 2) openSwitcher();
                    homeSwipeCount = 0;
                }, 300);
            }
        });

        // 悬浮AI输入回车事件
        const floatInput = document.querySelector('.ai-float-input');
        floatInput.addEventListener('keydown',(e)=>{
            if(e.key==='Enter'){
                const txt = floatInput.value.trim();
                if(!txt) return;
                handleAIInput(txt);
                floatInput.value='';
            }
        });
        // 悬浮AI发送按钮点击事件
        document.querySelector('.ai-float-send').addEventListener('click', () => {
            const txt = floatInput.value.trim();
            if(!txt) return;
            handleAIInput(txt);
            floatInput.value='';
        });
    }

    // 电源逻辑
    function singlePower(){ 
        if(!isPowerOn) return; 
        isScreenOn = !isScreenOn; 
        updateScreen(); 
    }
    function doublePower(){
        isPowerOn = !isPowerOn;
        isScreenOn = isPowerOn;
        updateScreen();
        if(!isPowerOn){
            activeApp = null;
            backgroundActivities.clear();
            appBackgroundList = [];
            closeFloatAI();
        }
    }
    function triplePower(){
        if(!isPowerOn || !isScreenOn) return;
        aiFloatMode = true;
        document.querySelector('.ai-float-dialog').classList.add('show');
    }

    function updateScreen(){
        const scr = document.querySelector('.iphone-screen');
        const home = document.querySelector('.home-screen');
        if(isScreenOn){
            scr.classList.remove('screen-off');
            if(!activeApp) home.classList.remove('hidden');
        }else{
            scr.classList.add('screen-off');
            home.classList.add('hidden');
            document.querySelector('.app-container').classList.add('hidden');
            document.querySelector('.ai-full-app').classList.remove('show');
            document.querySelector('.app-switcher').classList.remove('show');
            closeFloatAI();
        }
    }

    function closeFloatAI(){
        aiFloatMode = false;
        document.querySelector('.ai-float-dialog').classList.remove('show');
    }

    // 渲染主屏幕
    function renderHomeScreen(){
        const grid = document.querySelector('.app-grid');
        grid.innerHTML = '';
        Object.entries(apps).forEach(([name,info])=>{
            const el = document.createElement('div');
            el.className = 'app-icon';
            el.innerHTML = `
                <div class="app-icon-emoji glass" style="background:${info.color}">${info.icon}</div>
                <div class="app-name">${name}</div>
            `;
            el.onclick = () => openApp(name);
            grid.appendChild(el);
        });
    }

    // 打开APP
    function openApp(name){
        if(!isPowerOn || !isScreenOn) return;
        activeApp = name;
        backgroundActivities.delete(name);
        updateDynamicIsland();
        closeFloatAI();
        document.querySelector('.home-screen').classList.add('hidden');
        document.querySelector('.ai-full-app').classList.remove('show');
        document.querySelector('.app-switcher').classList.remove('show');
        const cont = document.querySelector('.app-container');
        cont.classList.remove('hidden');
        const info = apps[name];

        if(info.web){
            cont.innerHTML = `
                <div class="app-header" style="background:${info.color}">
                    <div class="app-title">${name}</div>
                </div>
                <div class="app-content"><iframe src="https://www.baidu.com"></iframe></div>
            `;
        } else if(info.music){
            cont.innerHTML = `
                <div class="app-header" style="background:${info.color}">
                    <div class="app-title">${name}</div>
                </div>
                <div class="app-content"><iframe src="https://music.apple.com"></iframe></div>
            `;
        } else if(info.update){
            cont.innerHTML = `
                <div class="app-header" style="background:${info.color}">
                    <div class="app-title">${name}</div>
                </div>
                <div class="app-content" style="padding:20px;">
                    <div style="font-size:18px;font-weight:bold;">更新中</div>
                    <div style="margin-top:8px;">正在下载资源包</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:68%"></div></div>
                    <div style="margin-top:4px;font-size:12px;color:#666">68%</div>
                </div>
            `;
        } else if(info.settings){
            cont.innerHTML = `
                <div class="app-header" style="background:${info.color}">
                    <div class="app-title">设置</div>
                </div>
                <div class="app-content">
                    <div class="settings-list">
                        <div class="settings-row"><div>飞行模式</div><div class="settings-switch"></div></div>
                        <div class="settings-row"><div>Wi‑Fi</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>蓝牙</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>蜂窝网络</div><div class="settings-switch"></div></div>
                        <div class="settings-row"><div>声音</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>亮度自动</div><div class="settings-switch on"></div></div>
                        <div style="padding:12px 0;border-bottom:1px solid #eee;">
                            <div style="margin-bottom:8px;">壁纸</div>
                            <div style="display:flex;flex-wrap:wrap;" id="wallpaper-list"></div>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(()=>{
                const list = document.getElementById('wallpaper-list');
                wallpapers.forEach((w,i)=>{
                    const div = document.createElement('div');
                    div.className = 'wallpaper-option';
                    div.style.background = w.css;
                    div.onclick = () => {
                        document.documentElement.style.setProperty('--home-wallpaper',w.css);
                        document.querySelectorAll('.wallpaper-option').forEach(o=>o.classList.remove('active'));
                        div.classList.add('active');
                    };
                    list.appendChild(div);
                });
                document.querySelectorAll('.settings-switch').forEach(s=>{
                    s.onclick = () => s.classList.toggle('on');
                });
            },0);
        } else if(info.ai){
            cont.innerHTML = `
                <div class="app-header" style="background:${info.color}">
                    <div class="app-title">松果AI</div>
                </div>
                <div class="app-content">
                    <div style="height:100%;display:flex;flex-direction:column;padding:16px;">
                        <div style="flex:1;overflow-y:auto;" id="ai-full-chat"></div>
                        <div style="display:flex;gap:8px;align-items:center;margin-top:10px;">
                            <input style="flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ddd;" placeholder="输入问题..." id="ai-full-input">
                            <button id="ai-full-send" class="glass" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#000;font-size:16px;cursor:pointer;">↑</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(()=>{
                const c = document.getElementById('ai-full-chat');
                const i = document.getElementById('ai-full-input');
                const sendBtn = document.getElementById('ai-full-send');
                // 渲染历史记录
                aiHistory.forEach(item=>{
                    c.innerHTML += `<div class="ai-msg ${item.role}">${item.text}</div>`;
                });
                // 回车发送
                i.onkeydown = e => {
                    if(e.key==='Enter'){
                        const t = i.value.trim();
                        if(!t) return;
                        addAIHistory(t,'user');
                        i.value = '';
                        setTimeout(()=>addAIHistory('我是松果AI～','ai'),600);
                    }
                };
                // 按钮发送
                sendBtn.onclick = () => {
                    const t = i.value.trim();
                    if(!t) return;
                    addAIHistory(t,'user');
                    i.value = '';
                    setTimeout(()=>addAIHistory('我是松果AI～','ai'),600);
                };
            },0);
        } else {
            cont.innerHTML = `
                <div class="app-header" style="background:${info.color}">
                    <div class="app-title">${name}</div>
                </div>
                <div class="app-content" style="display:flex;align-items:center;justify-content:center;">
                    <div style="text-align:center;">
                        <div style="font-size:60px;">${info.icon}</div>
                        <div style="font-size:20px;margin-top:12px;">${name}</div>
                    </div>
                </div>
            `;
        }
    }

    // 关闭APP回主页
    function closeAppToHome(){
        if(!activeApp) return;
        const name = activeApp;
        const info = apps[name];
        if(!appBackgroundList.includes(name)) appBackgroundList.push(name);
        let show = false;
        if(info.always||info.update||info.web||info.music) show = true;
        if(show) backgroundActivities.set(name,{title:name,content:info.update?"更新中 68%":"后台运行"});
        activeApp = null;
        document.querySelector('.app-container').classList.add('hidden');
        document.querySelector('.home-screen').classList.remove('hidden');
        updateDynamicIsland();
    }

    // 灵动岛逻辑
    let islandClickCount = 0, islandClickTimer;
    function updateDynamicIsland(){
        const isl = document.querySelector('.dynamic-island');
        const content = document.querySelector('.island-content');
        content.innerHTML = '';
        if(backgroundActivities.size === 0){
            isl.classList.remove('expanded','detailed');
            return;
        }
        const [name,act] = Array.from(backgroundActivities.entries()).pop();
        isl.classList.add('expanded');
        content.innerHTML = `
            <div class="island-app-icon">${apps[name].icon}</div>
            <div class="island-app-info">
                <div class="island-app-title">${act.title}</div>
                <div class="island-app-desc">${act.content}</div>
            </div>
        `;
    }
    function toggleIslandDetail(){
        const isl = document.querySelector('.dynamic-island');
        isl.classList.toggle('detailed');
        isl.classList.contains('detailed') ? autoCollapseIsland() : clearTimeout(islandAutoCloseTimer);
    }
    function collapseIslandDetail(){
        document.querySelector('.dynamic-island').classList.remove('detailed');
        clearTimeout(islandAutoCloseTimer);
    }
    function autoCollapseIsland(){
        clearTimeout(islandAutoCloseTimer);
        islandAutoCloseTimer = setTimeout(()=>collapseIslandDetail(),10000);
    }

    // 后台多任务
    function openSwitcher(){
        const switcher = document.querySelector('.app-switcher');
        const grid = document.querySelector('.switcher-grid');
        grid.innerHTML = '';
        appBackgroundList.forEach(name=>{
            const card = document.createElement('div');
            card.className = 'switcher-card';
            card.innerHTML = `
                <div class="switcher-close" data-name="${name}">×</div>
                <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${apps[name].color}">
                    <div style="font-size:40px;color:#fff;">${apps[name].icon}</div>
                </div>
            `;
            card.onclick = () => {openApp(name);switcher.classList.remove('show');};
            grid.appendChild(card);
        });
        switcher.classList.add('show');
        document.querySelectorAll('.switcher-close').forEach(btn=>{
            btn.onclick = (e) => {
                e.stopPropagation();
                const name = btn.dataset.name;
                appBackgroundList = appBackgroundList.filter(n=>n!==name);
                backgroundActivities.delete(name);
                updateDynamicIsland();
                openSwitcher();
            };
        });
    }

    // AI逻辑
    function addAIHistory(text,role){
        aiHistory.push({text,role});
        if(aiHistory.length>20) aiHistory.shift();
        // 悬浮模式下上岛
        if(aiFloatMode){
            const isl = document.querySelector('.dynamic-island');
            isl.classList.add('detailed');
            backgroundActivities.set("松果AI",{title:"松果AI",content:text.slice(0,12)+"..."});
            updateDynamicIsland();
            autoCollapseIsland();
        }
        // 同步到APP聊天框
        const c = document.getElementById('ai-full-chat');
        if(c) c.innerHTML += `<div class="ai-msg ${role}">${text}</div>`;
    }
    function handleAIInput(text){
        addAIHistory(text,'user');
        // 打开软件指令
        const reg = /打开(.+)/;
        const match = text.match(reg);
        if(match && apps[match[1]]){
            setTimeout(()=>{
                addAIHistory(`已为您打开${match[1]}`,`ai`);
                openApp(match[1]);
            },700);
            return;
        }
        // 普通回答
        setTimeout(()=>addAIHistory('我是松果AI～','ai'),700);
    }
</script>
</body>
</html>
