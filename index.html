<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 灵动岛模拟器</title>
    <style>
        :root {
            --light-angle: 145deg;
            --shadow-offset-x: 5px;
            --shadow-offset-y: 5px;
            --glass-bg: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
            --glass-blur: 20px;
            --iphone-width: 320px;
            --iphone-height: 650px;
            --iphone-radius: 35px;
            --island-initial-width: 90px;
            --island-initial-height: 28px;
            --island-expanded-width: 200px;
            --island-detailed-width: 280px;
            --island-detailed-height: 120px;
            --home-wallpaper: linear-gradient(135deg, #09203F, #537895);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        *:focus, *:active {
            outline: none !important;
            box-shadow: none !important;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .glass {
            background: linear-gradient(var(--light-angle), rgba(255,255,255,0.25), rgba(255,255,255,0.05));
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 var(--shadow-offset-y) var(--shadow-offset-x) rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .iphone-device {
            position: relative;
            width: var(--iphone-width);
            height: var(--iphone-height);
            border-radius: var(--iphone-radius);
            padding: 12px;
            background: linear-gradient(145deg, #a0a0a0, #d0d0d0);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: visible;
        }

        /* 侧边按键 */
        .left-buttons {
            position: absolute;
            left: -4px;
            top: 120px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 9999 !important;
            pointer-events: auto;
        }
        .side-button {
            width: 6px;
            height: 50px;
            border-radius: 3px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            transition: all 0.1s ease;
        }
        .side-button:active {
            transform: translateX(2px);
            opacity: 0.8;
        }

        .right-button {
            position: absolute;
            right: -4px;
            top: 180px;
            width: 6px;
            height: 70px;
            border-radius: 3px;
            cursor: pointer;
            z-index: 9999 !important;
            pointer-events: auto;
            background: rgba(255,255,255,0.3);
            transition: all 0.1s ease;
        }
        .right-button:active {
            transform: translateX(-2px);
            opacity: 0.8;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            border-radius: calc(var(--iphone-radius) - 8px);
            background: #000;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            z-index: 1;
        }
        .iphone-screen.screen-off {
            background: #000 !important;
        }

        .home-screen {
            width: 100%;
            height: 100%;
            padding: 55px 20px 20px;
            display: flex;
            flex-direction: column;
            background: var(--home-wallpaper);
            background-size: cover;
            background-position: center;
        }

        /* 灵动岛 + 隐藏摄像头占位 */
        .dynamic-island {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: var(--island-initial-width);
            height: var(--island-initial-height);
            border-radius: calc(var(--island-initial-height)/2);
            background: #000;
            z-index: 100;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }
        .camera-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #000;
            z-index: 101;
        }
        .dynamic-island.expanded {
            width: var(--island-expanded-width);
            border-radius: 18px;
        }
        .dynamic-island.detailed {
            width: var(--island-detailed-width);
            height: var(--island-detailed-height);
            border-radius: 25px;
            padding: 12px;
        }

        .island-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            color: #fff;
            font-size: 12px;
        }
        .island-app-icon { font-size: 14px; }
        .island-app-info { flex:1; margin-left:8px; overflow: hidden; }
        .island-app-title { font-weight:600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .island-app-desc { font-size:10px; opacity:0.8; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap:15px;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .app-icon-emoji {
            width:55px; height:55px; border-radius:12px;
            display: flex; align-items:center; justify-content:center;
            font-size:30px; margin-bottom:5px;
        }
        .app-name { color:#fff; font-size:12px; text-align:center; }

        .app-container {
            width:100%; height:100%;
            background:#fff;
            position:absolute; top:0; left:0; z-index:50;
            display:flex; flex-direction:column;
        }
        .app-header {
            height:50px; display:flex; align-items:center; padding:0 15px;
            color:#fff; font-weight:600;
        }
        .app-content { flex:1; background:#f2f2f7; overflow: hidden; }
        iframe { width:100%; height:100%; border:none; }

        /* 底部小黑条 */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            z-index: 200;
            cursor: pointer;
        }

        /* 后台多任务 */
        .app-switcher {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 70;
            display: none;
            padding: 60px 10px 80px;
        }
        .app-switcher.show { display: block; }
        .switcher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            height: 100%;
        }
        .switcher-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .switcher-close {
            position: absolute;
            top: 6px; right: 6px;
            width: 22px; height: 22px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border-radius: 50%;
            display: flex; align-items:center; justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* 悬浮AI对话框 */
        .ai-float-dialog {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(20,20,20,0.9);
            border-radius: 20px;
            padding:12px 16px;
            z-index: 90;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .ai-float-dialog.show { display:flex; }
        .ai-float-input {
            flex: 1;
            padding:8px 12px;
            border-radius:16px;
            border:none;
            background: rgba(255,255,255,0.1);
            color:#fff;
            font-size:14px;
        }
        .ai-float-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        /* AI整页APP */
        .ai-full-app {
            width:100%; height:100%;
            position:absolute; top:0; left:0; z-index:60;
            background:#1a1a2e;
            color:#fff;
            padding:60px 16px 80px;
            display: none;
            flex-direction: column;
        }
        .ai-full-app.show { display:flex; }
        .ai-chat-history {
            flex:1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap:10px;
        }
        .ai-msg {
            max-width:80%;
            padding:8px 12px;
            border-radius:16px;
            word-wrap: break-word;
        }
        .ai-msg.user { align-self:end; background:#007aff; }
        .ai-msg.ai { align-self:start; background:rgba(255,255,255,0.1); }
        .ai-msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; }

        /* 设置 */
        .settings-list { padding:16px; }
        .settings-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom:1px solid #eee;
        }
        .settings-switch {
            width:50px; height:30px; background:#ccc; border-radius:15px; position:relative;
        }
        .settings-switch::after {
            content:''; width:26px; height:26px; background:#fff; border-radius:50%;
            position:absolute; top:2px; left:2px; transition:0.2s;
        }
        .settings-switch.on { background:#07c160; }
        .settings-switch.on::after { left:22px; }

        .wallpaper-option {
            width: 60px; height: 60px; border-radius: 12px; margin: 6px;
            cursor: pointer; border: 2px solid transparent;
        }
        .wallpaper-option.active { border-color: #007aff; }

        .progress-bar {
            width:100%; height:6px; background:#ddd; border-radius:3px; margin-top:6px; overflow:hidden;
        }
        .progress-fill { height:100%; background:#007aff; width:0%; transition: width 0.3s; }

        /* 相机APP样式 */
        .camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        .camera-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        .shutter-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #888;
            cursor: pointer;
        }
        .camera-back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
        }

        /* 相册APP样式 */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
            height: 100%;
            overflow-y: auto;
        }
        .album-photo {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            cursor: pointer;
        }
        .photo-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .photo-preview.show { display: flex; }
        .photo-preview img {
            max-width: 100%;
            max-height: 100%;
        }

        /* 群聊APP样式 */
        .chat-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            height: 50px;
            background: #25D366;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
        }
        .online-count {
            font-size: 12px;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-msg {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }
        .chat-msg.self {
            align-self: flex-end;
        }
        .chat-msg.other {
            align-self: flex-start;
        }
        .chat-msg-name {
            font-size: 10px;
            color: #666;
            margin-bottom: 2px;
        }
        .chat-msg-content {
            padding: 8px 12px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        .chat-msg.self .chat-msg-content {
            background: #95ec69;
        }
        .chat-msg.other .chat-msg-content {
            background: #fff;
        }
        .chat-msg-content img {
            max-width: 100%;
            border-radius: 6px;
        }
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        .chat-photo-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        .chat-input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 20px;
            border: 1px solid #eee;
            background: #f5f5f5;
        }
        .chat-send-btn {
            padding: 8px 16px;
            border-radius: 20px;
            background: #25D366;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .photo-selector {
            position: absolute;
            bottom: 70px;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 10px;
            display: none;
            z-index: 10;
        }
        .photo-selector.show { display: block; }
        .photo-selector-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            max-height: 150px;
            overflow-y: auto;
        }

        .hidden { display:none !important; }
    </style>
</head>
<body>

<div class="iphone-device glass">
    <!-- 左侧音量按键 -->
    <div class="left-buttons">
        <div class="volume-up side-button"></div>
        <div class="volume-down side-button"></div>
    </div>
    <!-- 右侧电源键 -->
    <div class="power-button right-button"></div>

    <div class="iphone-screen screen-off">
        <!-- 灵动岛 -->
        <div class="dynamic-island">
            <div class="camera-placeholder"></div>
            <div class="island-content"></div>
        </div>

        <!-- 主屏幕 -->
        <div class="home-screen hidden">
            <div class="app-grid"></div>
        </div>

        <!-- APP容器 -->
        <div class="app-container hidden"></div>

        <!-- 后台多任务 -->
        <div class="app-switcher"><div class="switcher-grid"></div></div>

        <!-- 悬浮AI对话框 -->
        <div class="ai-float-dialog">
            <input class="ai-float-input" placeholder="问松果AI..." />
            <button class="ai-float-send glass">↑</button>
        </div>

        <!-- AI整页APP -->
        <div class="ai-full-app">
            <div class="ai-chat-history"></div>
        </div>

        <!-- 底部小黑条 -->
        <div class="home-indicator"></div>
    </div>
</div>

<script>
    // 全局状态
    let isPowerOn = false, isScreenOn = false, activeApp = null;
    let backgroundActivities = new Map();
    let appBackgroundList = [];
    let islandAutoCloseTimer = null;
    let aiFloatMode = false;
    let aiHistory = [];
    let homeSwipeCount = 0;
    let homeSwipeTimer;
    let powerClickCount = 0;
    let powerClickTimer;
    let islandClickCount = 0;
    let islandClickTimer;

    // Deepseek API配置
    const DEEPSEEK_API_KEY = "sk-678240ff6e0d4951bec795b0823cbbaf";
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";

    // 相册存储
    let photoAlbum = JSON.parse(localStorage.getItem('iphone_album')) || [];

    // 群聊配置
    const USER_ID = Math.random().toString(36).substr(2, 8);
    const USER_NAME = "用户" + USER_ID.substr(0, 4);
    const CHAT_STORAGE_KEY = "iphone_group_chat";
    const ONLINE_STORAGE_KEY = "iphone_online_users";

    // 壁纸列表
    const wallpapers = [
        { name: '深蓝', css: 'linear-gradient(135deg, #09203F, #537895)' },
        { name: '紫黑', css: 'linear-gradient(135deg, #24243E, #302B63)' },
        { name: '墨绿', css: 'linear-gradient(135deg, #1A2980, #26D0CE)' },
        { name: '暖橙', css: 'linear-gradient(135deg, #FF416C, #FF4B2B)' },
        { name: '暗黑', css: '#111' }
    ];

    // APP列表
    const apps = {
        相机: { icon:"📷", color:"#1C1C1E" },
        相册: { icon:"🖼️", color:"#FF9500" },
        群聊: { icon:"👥", color:"#25D366", chat:true },
        设置: { icon:"⚙️", color:"#8E8E93", settings:true },
        Safari: { icon:"🌐", color:"#007AFF", web:true },
        音乐: { icon:"🎵", color:"#FF2D55", music:true },
        流体云: { icon:"☁️", color:"#4fa3ff", update:true },
        松果AI: { icon:"🤖", color:"#5856d6", ai:true },
    };

    // 页面初始化
    window.addEventListener('DOMContentLoaded', () => {
        renderHomeScreen();
        updateDynamicIsland();
        bindEvents();
        initOnlineStatus();
        initChatListener();

        // 点击空白关闭灵动岛
        document.querySelector('.iphone-screen').addEventListener('click', (e) => {
            if(!e.target.closest('.dynamic-island')) collapseIslandDetail();
        });
    });

    // 事件绑定
    function bindEvents() {
        // 音量+按键
        document.querySelector('.volume-up').addEventListener('click', () => {
            if(!isPowerOn) return;
        });
        // 音量-按键
        document.querySelector('.volume-down').addEventListener('click', () => {
            if(!isPowerOn) return;
        });
        // 电源按键
        document.querySelector('.power-button').addEventListener('click', () => {
            powerClickCount++;
            clearTimeout(powerClickTimer);
            powerClickTimer = setTimeout(() => {
                if(powerClickCount === 1) singlePower();
                else if(powerClickCount === 2) doublePower();
                else if(powerClickCount >= 3) triplePower();
                powerClickCount = 0;
            }, 500);
        });

        // 灵动岛点击
        const island = document.querySelector('.dynamic-island');
        island.addEventListener('click', () => {
            if(backgroundActivities.size === 0) return;
            islandClickCount++;
            clearTimeout(islandClickTimer);
            islandClickTimer = setTimeout(() => {
                if(islandClickCount === 1){
                    const [app] = Array.from(backgroundActivities.entries()).pop();
                    openApp(app);
                }else{
                    toggleIslandDetail();
                }
                islandClickCount = 0;
            }, 350);
        });

        // 小黑条点击逻辑
        const homeIndicator = document.querySelector('.home-indicator');
        homeIndicator.addEventListener('click', () => {
            const switcher = document.querySelector('.app-switcher');
            if(switcher.classList.contains('show')){
                switcher.classList.remove('show');
                return;
            }
            if(activeApp) {
                closeAppToHome();
            } else {
                homeSwipeCount++;
                clearTimeout(homeSwipeTimer);
                homeSwipeTimer = setTimeout(() => {
                    if(homeSwipeCount >= 2) openSwitcher();
                    homeSwipeCount = 0;
                }, 300);
            }
        });

        // 悬浮AI发送事件
        const floatInput = document.querySelector('.ai-float-input');
        const floatSendBtn = document.querySelector('.ai-float-send');
        floatInput.addEventListener('keydown',(e)=>{
            if(e.key==='Enter'){
                const txt = floatInput.value.trim();
                if(!txt) return;
                handleAIInput(txt);
                floatInput.value='';
            }
        });
        floatSendBtn.addEventListener('click', () => {
            const txt = floatInput.value.trim();
            if(!txt) return;
            handleAIInput(txt);
            floatInput.value='';
        });
    }

    // 电源逻辑
    function singlePower(){ 
        if(!isPowerOn) return; 
        isScreenOn = !isScreenOn; 
        updateScreen(); 
    }
    function doublePower(){
        isPowerOn = !isPowerOn;
        isScreenOn = isPowerOn;
        updateScreen();
        if(!isPowerOn){
            activeApp = null;
            backgroundActivities.clear();
            appBackgroundList = [];
            closeFloatAI();
        }
    }
    function triplePower(){
        if(!isPowerOn || !isScreenOn) return;
        aiFloatMode = true;
        document.querySelector('.ai-float-dialog').classList.add('show');
    }

    // 屏幕状态更新
    function updateScreen(){
        const scr = document.querySelector('.iphone-screen');
        const home = document.querySelector('.home-screen');
        if(isScreenOn){
            scr.classList.remove('screen-off');
            if(!activeApp) home.classList.remove('hidden');
        }else{
            scr.classList.add('screen-off');
            home.classList.add('hidden');
            document.querySelector('.app-container').classList.add('hidden');
            document.querySelector('.ai-full-app').classList.remove('show');
            document.querySelector('.app-switcher').classList.remove('show');
            closeFloatAI();
        }
    }

    function closeFloatAI(){
        aiFloatMode = false;
        document.querySelector('.ai-float-dialog').classList.remove('show');
    }

    // 渲染主屏幕
    function renderHomeScreen(){
        const grid = document.querySelector('.app-grid');
        grid.innerHTML = '';
        Object.entries(apps).forEach(([name,info])=>{
            const el = document.createElement('div');
            el.className = 'app-icon';
            el.innerHTML = `
                <div class="app-icon-emoji glass" style="background:${info.color}">${info.icon}</div>
                <div class="app-name">${name}</div>
            `;
            el.onclick = () => openApp(name);
            grid.appendChild(el);
        });
    }

    // 打开APP
    function openApp(name){
        if(!isPowerOn || !isScreenOn) return;
        activeApp = name;
        backgroundActivities.delete(name);
        updateDynamicIsland();
        closeFloatAI();
        document.querySelector('.home-screen').classList.add('hidden');
        document.querySelector('.ai-full-app').classList.remove('show');
        document.querySelector('.app-switcher').classList.remove('show');
        const cont = document.querySelector('.app-container');
        cont.classList.remove('hidden');
        const info = apps[name];

        // 基础APP头
        const appHeader = `
            <div class="app-header" style="background:${info.color}">
                <div class="app-title">${name}</div>
            </div>
        `;

        // 网页APP
        if(info.web){
            cont.innerHTML = appHeader + `
                <div class="app-content"><iframe src="https://www.baidu.com"></iframe></div>
            `;
        }
        // 音乐APP
        else if(info.music){
            cont.innerHTML = appHeader + `
                <div class="app-content"><iframe src="https://music.apple.com"></iframe></div>
            `;
        }
        // 流体云APP
        else if(info.update){
            cont.innerHTML = appHeader + `
                <div class="app-content" style="padding:20px;">
                    <div style="font-size:18px;font-weight:bold;">更新中</div>
                    <div style="margin-top:8px;">正在下载资源包</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:68%"></div></div>
                    <div style="margin-top:4px;font-size:12px;color:#666">68%</div>
                </div>
            `;
        }
        // 设置APP
        else if(info.settings){
            cont.innerHTML = appHeader + `
                <div class="app-content">
                    <div class="settings-list">
                        <div class="settings-row"><div>飞行模式</div><div class="settings-switch"></div></div>
                        <div class="settings-row"><div>Wi‑Fi</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>蓝牙</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>蜂窝网络</div><div class="settings-switch"></div></div>
                        <div class="settings-row"><div>声音</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>亮度自动</div><div class="settings-switch on"></div></div>
                        <div class="settings-row"><div>相机权限</div><div class="settings-switch on"></div></div>
                        <div style="padding:12px 0;border-bottom:1px solid #eee;">
                            <div style="margin-bottom:8px;">壁纸</div>
                            <div style="display:flex;flex-wrap:wrap;" id="wallpaper-list"></div>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(()=>{
                const list = document.getElementById('wallpaper-list');
                wallpapers.forEach((w,i)=>{
                    const div = document.createElement('div');
                    div.className = 'wallpaper-option';
                    div.style.background = w.css;
                    div.onclick = () => {
                        document.documentElement.style.setProperty('--home-wallpaper',w.css);
                        document.querySelectorAll('.wallpaper-option').forEach(o=>o.classList.remove('active'));
                        div.classList.add('active');
                    };
                    list.appendChild(div);
                });
                document.querySelectorAll('.settings-switch').forEach(s=>{
                    s.onclick = () => s.classList.toggle('on');
                });
            },0);
        }
        // 松果AI APP
        else if(info.ai){
            cont.innerHTML = appHeader + `
                <div class="app-content">
                    <div style="height:100%;display:flex;flex-direction:column;padding:16px;">
                        <div style="flex:1;overflow-y:auto;" id="ai-full-chat"></div>
                        <div style="display:flex;gap:8px;align-items:center;margin-top:10px;">
                            <input style="flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ddd;" placeholder="输入问题..." id="ai-full-input">
                            <button id="ai-full-send" class="glass" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#000;font-size:16px;cursor:pointer;">↑</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(()=>{
                const c = document.getElementById('ai-full-chat');
                const i = document.getElementById('ai-full-input');
                const sendBtn = document.getElementById('ai-full-send');
                // 渲染历史记录
                aiHistory.forEach(item=>{
                    c.innerHTML += `<div class="ai-msg ${item.role}">${item.text}</div>`;
                });
                // 发送函数（统一走handleAIInput，优先处理打开指令）
                const sendMsg = () => {
                    const t = i.value.trim();
                    if(!t) return;
                    handleAIInput(t);
                    i.value = '';
                };
                i.onkeydown = e => e.key==='Enter' && sendMsg();
                sendBtn.onclick = sendMsg;
            },0);
        }
        // 相机APP
        else if(info.camera){
            cont.innerHTML = `
                <div class="app-content" style="position:relative;background:#000;">
                    <button class="camera-back-btn">×</button>
                    <video class="camera-preview" autoplay muted playsinline></video>
                    <div class="camera-controls">
                        <button class="shutter-btn"></button>
                    </div>
                </div>
            `;
            initCamera();
        }
        // 相册APP
        else if(info.album){
            cont.innerHTML = appHeader + `
                <div class="app-content">
                    <div class="album-grid" id="album-grid"></div>
                    <div class="photo-preview" id="photo-preview">
                        <img id="preview-img" src="" alt="">
                    </div>
                </div>
            `;
            renderAlbum();
        }
        // 群聊APP
        else if(info.chat){
            cont.innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <span>公共群聊</span>
                        <span class="online-count" id="online-count">在线：1人</span>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-area">
                        <button class="chat-photo-btn glass">📷</button>
                        <input class="chat-input" id="chat-input" placeholder="输入消息...">
                        <button class="chat-send-btn">发送</button>
                    </div>
                    <div class="photo-selector" id="photo-selector">
                        <div class="photo-selector-grid" id="photo-selector-grid"></div>
                    </div>
                </div>
            `;
            initChatApp();
        }
        // 普通APP
        else {
            cont.innerHTML = appHeader + `
                <div class="app-content" style="display:flex;align-items:center;justify-content:center;">
                    <div style="text-align:center;">
                        <div style="font-size:60px;">${info.icon}</div>
                        <div style="font-size:20px;margin-top:12px;">${name}</div>
                    </div>
                </div>
            `;
        }
    }

    // 关闭APP回主页：所有应用统一上岛3.5秒后自动下岛
    function closeAppToHome(){
        if(!activeApp) return;
        const name = activeApp;
        const info = apps[name];
        if(!appBackgroundList.includes(name)) appBackgroundList.push(name);
        
        // 所有APP退出都上岛
        backgroundActivities.set(name,{title:name,content:info.update?"更新中 68%":"后台运行"});
        updateDynamicIsland();

        // 所有应用统一：上岛3.5秒后自动下岛
        setTimeout(() => {
            backgroundActivities.delete(name);
            updateDynamicIsland();
        }, 3500);

        activeApp = null;
        document.querySelector('.app-container').classList.add('hidden');
        document.querySelector('.home-screen').classList.remove('hidden');
    }

    // 灵动岛逻辑
    function updateDynamicIsland(){
        const isl = document.querySelector('.dynamic-island');
        const content = document.querySelector('.island-content');
        content.innerHTML = '';
        if(backgroundActivities.size === 0){
            isl.classList.remove('expanded','detailed');
            return;
        }
        const [name,act] = Array.from(backgroundActivities.entries()).pop();
        isl.classList.add('expanded');
        content.innerHTML = `
            <div class="island-app-icon">${apps[name].icon}</div>
            <div class="island-app-info">
                <div class="island-app-title">${act.title}</div>
                <div class="island-app-desc">${act.content}</div>
            </div>
        `;
    }
    function toggleIslandDetail(){
        const isl = document.querySelector('.dynamic-island');
        isl.classList.toggle('detailed');
        isl.classList.contains('detailed') ? autoCollapseIsland() : clearTimeout(islandAutoCloseTimer);
    }
    function collapseIslandDetail(){
        document.querySelector('.dynamic-island').classList.remove('detailed');
        clearTimeout(islandAutoCloseTimer);
    }
    function autoCollapseIsland(){
        clearTimeout(islandAutoCloseTimer);
        islandAutoCloseTimer = setTimeout(()=>collapseIslandDetail(),10000);
    }

    // 后台多任务
    function openSwitcher(){
        const switcher = document.querySelector('.app-switcher');
        const grid = document.querySelector('.switcher-grid');
        grid.innerHTML = '';
        appBackgroundList.forEach(name=>{
            const card = document.createElement('div');
            card.className = 'switcher-card';
            card.innerHTML = `
                <div class="switcher-close" data-name="${name}">×</div>
                <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${apps[name].color}">
                    <div style="font-size:40px;color:#fff;">${apps[name].icon}</div>
                </div>
            `;
            card.onclick = () => {openApp(name);switcher.classList.remove('show');};
            grid.appendChild(card);
        });
        switcher.classList.add('show');
        document.querySelectorAll('.switcher-close').forEach(btn=>{
            btn.onclick = (e) => {
                e.stopPropagation();
                const name = btn.dataset.name;
                appBackgroundList = appBackgroundList.filter(n=>n!==name);
                backgroundActivities.delete(name);
                updateDynamicIsland();
                openSwitcher();
            };
        });
    }

    // AI核心逻辑（优先处理打开指令，不调用Deepseek）
    function addAIHistory(text,role){
        aiHistory.push({text,role});
        if(aiHistory.length>50) aiHistory.shift();
        // 悬浮模式上岛
        if(aiFloatMode){
            const isl = document.querySelector('.dynamic-island');
            isl.classList.add('detailed');
            backgroundActivities.set("松果AI",{title:"松果AI",content:text.slice(0,12)+"..."});
            updateDynamicIsland();
            autoCollapseIsland();
        }
        // 同步到APP聊天框
        const c = document.getElementById('ai-full-chat');
        if(c) c.innerHTML += `<div class="ai-msg ${role}">${text}</div>`;
    }

    function handleAIInput(text){
        addAIHistory(text,'user');
        // 优先处理打开APP指令，绝对不调用Deepseek
        const openReg = /^打开(.+?)$/;
        const match = text.match(openReg);
        if(match) {
            const appName = match[1].trim();
            if(apps[appName]) {
                setTimeout(()=>{
                    addAIHistory(`已为您打开${appName}`,`ai`);
                    openApp(appName);
                },500);
            } else {
                setTimeout(()=>{
                    addAIHistory(`抱歉，没有找到${appName}这个APP`,`ai`);
                },500);
            }
            return; // 直接返回，不调用Deepseek
        }
        // 其他内容调用Deepseek API
        callDeepseekAPI(text);
    }

    // Deepseek API调用
    async function callDeepseekAPI(userInput){
        const loadingId = aiFloatMode ? null : addAIHistory('正在思考...','ai');
        try {
            const response = await fetch(DEEPSEEK_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是松果AI，一款内置在iPhone模拟器中的智能助手，回答简洁友好，符合手机助手定位' },
                        { role: 'user', content: userInput }
                    ],
                    stream: false,
                    temperature: 0.7
                })
            });
            if(!response.ok) throw new Error('API调用失败');
            const data = await response.json();
            const reply = data.choices[0].message.content;
            if(aiFloatMode){
                addAIHistory(reply,'ai');
            }else{
                // 替换加载消息
                const c = document.getElementById('ai-full-chat');
                c.lastChild.remove();
                addAIHistory(reply,'ai');
            }
        } catch (error) {
            const errMsg = `抱歉，调用失败：${error.message}`;
            if(aiFloatMode){
                addAIHistory(errMsg,'ai');
            }else{
                const c = document.getElementById('ai-full-chat');
                c.lastChild.remove();
                addAIHistory(errMsg,'ai');
            }
        }
    }

    // 相机初始化
    function initCamera(){
        const video = document.querySelector('.camera-preview');
        const shutterBtn = document.querySelector('.shutter-btn');
        const backBtn = document.querySelector('.camera-back-btn');
        let stream = null;

        // 申请相机权限
        async function startCamera(){
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (error) {
                alert('相机权限被拒绝，请在设置中开启相机权限');
            }
        }

        // 拍照
        shutterBtn.addEventListener('click', () => {
            if(!stream) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const photoUrl = canvas.toDataURL('image/jpeg');
            // 保存到相册
            photoAlbum.unshift(photoUrl);
            localStorage.setItem('iphone_album', JSON.stringify(photoAlbum));
            // 拍照反馈
            video.style.filter = 'brightness(2)';
            setTimeout(() => video.style.filter = 'none', 100);
        });

        // 返回按钮
        backBtn.addEventListener('click', () => {
            if(stream) stream.getTracks().forEach(track => track.stop());
            closeAppToHome();
        });

        startCamera();
    }

    // 渲染相册
    function renderAlbum(){
        const grid = document.getElementById('album-grid');
        const preview = document.getElementById('photo-preview');
        const previewImg = document.getElementById('preview-img');
        grid.innerHTML = '';

        if(photoAlbum.length === 0){
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px 0;color:#666;">暂无照片</div>';
            return;
        }

        photoAlbum.forEach((photo,index) => {
            const img = document.createElement('img');
            img.src = photo;
            img.className = 'album-photo';
            img.onclick = () => {
                previewImg.src = photo;
                preview.classList.add('show');
            };
            grid.appendChild(img);
        });

        // 点击预览关闭
        preview.onclick = () => preview.classList.remove('show');
    }

    // 群聊初始化
    function initChatApp(){
        const msgContainer = document.getElementById('chat-messages');
        const input = document.getElementById('chat-input');
        const sendBtn = document.querySelector('.chat-send-btn');
        const photoBtn = document.querySelector('.chat-photo-btn');
        const photoSelector = document.getElementById('photo-selector');
        const photoSelectorGrid = document.getElementById('photo-selector-grid');
        const onlineCountEl = document.getElementById('online-count');

        // 渲染聊天记录
        function renderChatMessages(){
            const messages = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY)) || [];
            msgContainer.innerHTML = '';
            messages.forEach(msg => {
                const isSelf = msg.userId === USER_ID;
                const msgEl = document.createElement('div');
                msgEl.className = `chat-msg ${isSelf ? 'self' : 'other'}`;
                msgEl.innerHTML = `
                    <div class="chat-msg-name">${isSelf ? '我' : msg.userName}</div>
                    <div class="chat-msg-content">${msg.content}</div>
                `;
                msgContainer.appendChild(msgEl);
            });
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // 发送消息
        function sendMessage(content){
            if(!content.trim()) return;
            const messages = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY)) || [];
            const newMsg = {
                userId: USER_ID,
                userName: USER_NAME,
                content: content,
                time: Date.now()
            };
            messages.push(newMsg);
            if(messages.length>200) messages.shift();
            localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(messages));
            input.value = '';
            // 发送后立刻渲染
            renderChatMessages();
        }

        // 发送事件
        sendBtn.onclick = () => sendMessage(input.value);
        input.onkeydown = e => e.key==='Enter' && sendMessage(input.value);

        // 照片选择器
        photoBtn.onclick = () => {
            photoSelector.classList.toggle('show');
            photoSelectorGrid.innerHTML = '';
            if(photoAlbum.length === 0){
                photoSelectorGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:10px;color:#666;">暂无照片</div>';
                return;
            }
            photoAlbum.forEach(photo => {
                const img = document.createElement('img');
                img.src = photo;
                img.style.width = '100%';
                img.style.aspectRatio = '1/1';
                img.style.objectFit = 'cover';
                img.onclick = () => {
                    sendMessage(`<img src="${photo}" alt="照片">`);
                    photoSelector.classList.remove('show');
                };
                photoSelectorGrid.appendChild(img);
            });
        };

        // 在线人数更新
        function updateOnlineCount(){
            const onlineUsers = JSON.parse(localStorage.getItem(ONLINE_STORAGE_KEY)) || {};
            const count = Object.keys(onlineUsers).length;
            onlineCountEl.innerText = `在线：${count}人`;
        }

        // 监听storage变化
        window.addEventListener('storage', (e) => {
            if(e.key === CHAT_STORAGE_KEY) renderChatMessages();
            if(e.key === ONLINE_STORAGE_KEY) updateOnlineCount();
        });

        // 初始化渲染
        renderChatMessages();
        updateOnlineCount();
    }

    // 在线状态初始化
    function initOnlineStatus(){
        function updateOnline(){
            const onlineUsers = JSON.parse(localStorage.getItem(ONLINE_STORAGE_KEY)) || {};
            onlineUsers[USER_ID] = Date.now();
            // 清理30秒无心跳的用户
            Object.keys(onlineUsers).forEach(id => {
                if(Date.now() - onlineUsers[id] > 30000) delete onlineUsers[id];
            });
            localStorage.setItem(ONLINE_STORAGE_KEY, JSON.stringify(onlineUsers));
        }
        // 心跳
        updateOnline();
        setInterval(updateOnline, 10000);
        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            const onlineUsers = JSON.parse(localStorage.getItem(ONLINE_STORAGE_KEY)) || {};
            delete onlineUsers[USER_ID];
            localStorage.setItem(ONLINE_STORAGE_KEY, JSON.stringify(onlineUsers));
        });
    }

    // 群聊消息监听
    function initChatListener(){
        document.addEventListener('visibilitychange', () => {
            if(!document.hidden && activeApp === '群聊'){
                const msgContainer = document.getElementById('chat-messages');
                if(msgContainer){
                    const messages = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY)) || [];
                    msgContainer.innerHTML = '';
                    messages.forEach(msg => {
                        const isSelf = msg.userId === USER_ID;
                        const msgEl = document.createElement('div');
                        msgEl.className = `chat-msg ${isSelf ? 'self' : 'other'}`;
                        msgEl.innerHTML = `
                            <div class="chat-msg-name">${isSelf ? '我' : msg.userName}</div>
                            <div class="chat-msg-content">${msg.content}</div>
                        `;
                        msgContainer.appendChild(msgEl);
                    });
                }
            }
        });
    }
</script>
