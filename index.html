<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>网课会议系统 | 可直接GitHub发布</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1677ff',
            success: '#00b42a',
            warning: '#ff7d00',
            danger: '#f53f3f',
            dark: '#1f2937',
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide { scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .video-card { aspect-ratio: 16/9; }
      .barrage { animation: barrage 8s linear forwards; }
      @keyframes barrage {
        from { transform: translateX(100vw); }
        to { transform: translateX(-100%); }
      }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 m-0 p-0 min-h-screen">
  <!-- 提示框 -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 px-4 py-2 rounded bg-black/75 text-white z-50 opacity-0 transition-opacity duration-300"></div>

  <!-- 首页 -->
  <div id="home" class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="text-center mb-10">
      <h1 class="text-3xl md:text-4xl font-bold text-dark mb-2">网课会议系统</h1>
      <p class="text-gray-500">创建/加入会议 · 密钥入会 · 网课直播</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md">
      <button id="createBtn" class="flex-1 bg-primary hover:bg-primary/90 text-white py-4 px-6 rounded-xl text-lg font-medium transition">创建会议</button>
      <button id="joinBtn" class="flex-1 bg-white border-2 border-primary text-primary hover:bg-primary/5 py-4 px-6 rounded-xl text-lg font-medium transition">加入会议</button>
    </div>
  </div>

  <!-- 加入会议弹窗 -->
  <div id="joinModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md">
      <h3 class="text-xl font-bold mb-4">加入会议</h3>
      <input type="text" id="joinKey" placeholder="请输入12位会议密钥（区分大小写）" class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-4 outline-none focus:border-primary text-lg">
      <div class="flex gap-3">
        <button id="cancelJoin" class="flex-1 border border-gray-300 py-2 rounded-lg hover:bg-gray-50">取消</button>
        <button id="confirmJoin" class="flex-1 bg-primary text-white py-2 rounded-lg hover:bg-primary/90">加入会议</button>
      </div>
    </div>
  </div>

  <!-- 会议主界面 -->
  <div id="room" class="hidden flex flex-col h-screen bg-dark text-white">
    <!-- 顶部信息栏 -->
    <div class="flex items-center justify-between p-3 border-b border-gray-700 flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <div>
          <p class="m-0 text-sm text-gray-300">会议密钥</p>
          <p id="roomKey" class="m-0 text-lg font-bold text-primary"></p>
        </div>
        <button id="copyKey" class="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-sm">复制</button>
        <div id="qrcodeContainer" class="w-16 h-16 bg-white rounded p-1"></div>
      </div>
      <div>
        <span id="userRole" class="text-success font-medium"></span>
        <button id="leaveBtn" class="ml-3 bg-danger hover:bg-danger/90 px-3 py-1 rounded text-sm">离开会议</button>
      </div>
    </div>

    <!-- 中间主体区域 -->
    <div class="flex flex-1 overflow-hidden">
      <!-- 视频区域 -->
      <div class="flex-1 p-3 overflow-auto">
        <div id="videos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
      </div>

      <!-- 电脑端右侧面板 -->
      <div class="w-72 border-l border-gray-700 flex flex-col bg-gray-900 hidden md:flex">
        <!-- 白板 -->
        <div class="p-3 border-b border-gray-700">
          <h3 class="text-sm font-bold mb-2">白板 / 课件</h3>
          <canvas id="whiteboard" class="w-full h-32 bg-white rounded cursor-crosshair"></canvas>
          <div class="flex gap-2 mt-2">
            <button id="clearBoard" class="text-xs bg-gray-700 px-2 py-1 rounded">清空白板</button>
            <input type="file" id="uploadFile" class="hidden" accept="*">
            <label for="uploadFile" class="text-xs bg-primary px-2 py-1 rounded cursor-pointer">上传课件</label>
          </div>
        </div>

        <!-- 参会者 -->
        <div class="p-3 border-b border-gray-700 flex-1 overflow-y-auto scrollbar-hide">
          <h3 class="text-sm font-bold mb-2">参会者 <span id="userCount">0</span></h3>
          <div id="userList" class="space-y-1"></div>
        </div>

        <!-- 聊天 -->
        <div class="p-3 border-t border-gray-700 h-48 flex flex-col">
          <h3 class="text-sm font-bold mb-1">聊天</h3>
          <div id="chatBox" class="flex-1 bg-gray-800 rounded p-1 text-sm overflow-y-auto scrollbar-hide mb-1"></div>
          <div class="flex gap-1">
            <input id="chatInput" class="flex-1 px-2 py-1 text-xs rounded border-none outline-none bg-gray-700" placeholder="发送消息...">
            <button id="sendChat" class="px-2 py-1 bg-primary text-xs rounded">发送</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部控制栏 -->
    <div class="flex justify-center gap-3 p-3 border-t border-gray-700">
      <button id="micBtn" class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 text-lg">🎤</button>
      <button id="cameraBtn" class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 text-lg">📷</button>
      <button id="shareBtn" class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 text-lg">🖥️</button>
      <button id="recordBtn" class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 text-lg">⏺️</button>
      <button id="handBtn" class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center hover:bg-gray-600 text-lg">✋</button>
      <button id="sideToggle" class="md:hidden w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-lg">☰</button>
    </div>
  </div>

  <!-- 移动端侧边栏 -->
  <div id="mobileSide" class="fixed right-0 top-0 bottom-0 w-64 bg-gray-900 z-40 transform translate-x-full transition-transform duration-300 p-3 overflow-y-auto scrollbar-hide">
    <button id="closeMobile" class="mb-3 bg-gray-700 px-2 py-1 rounded text-sm w-full">关闭面板</button>
    
    <div class="text-sm font-bold mb-2">白板 / 课件</div>
    <canvas id="mobileBoard" class="w-full h-24 bg-white rounded cursor-crosshair"></canvas>
    <button id="clearMobile" class="mt-2 text-xs bg-gray-700 px-2 py-1 rounded w-full">清空白板</button>
    <label for="mobileUpload" class="block mt-2 text-xs bg-primary px-2 py-1 rounded text-center cursor-pointer">上传课件</label>
    <input type="file" id="mobileUpload" class="hidden">
    
    <div class="text-sm font-bold mt-4 mb-2">参会者 <span id="mobileCount">0</span></div>
    <div id="mobileList" class="space-y-1 mb-4"></div>
    
    <div class="text-sm font-bold mb-2">聊天</div>
    <div id="mobileChat" class="bg-gray-800 h-32 rounded p-1 text-sm mb-1 overflow-y-auto"></div>
    <input id="mobileInput" class="w-full px-2 py-1 text-xs rounded bg-gray-700 mb-1" placeholder="发送消息">
    <button id="mobileSend" class="w-full bg-primary text-xs py-1 rounded">发送</button>
  </div>

  <!-- 弹幕容器 -->
  <div id="barrageContainer" class="fixed inset-0 pointer-events-none z-10"></div>

  <script>
    // 全局变量
    let peer = null;
    let localPeerId = "";
    let roomKey = "";
    let isHost = false;
    let localStream = null;
    let shareStream = null;
    let mediaRecorder = null;
    let isRecording = false;
    let isMiced = false;
    let isCamered = false;
    let isHandUp = false;
    
    const connections = new Map();
    const userList = new Map();
    const videosEl = document.getElementById("videos");
    const chatBox = document.getElementById("chatBox");
    const mobileSide = document.getElementById("mobileSide");

    // 提示框
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("opacity-100");
      setTimeout(() => t.classList.remove("opacity-100"), 2000);
    }

    // 生成12位大小写+数字密钥
    function generateRoomKey() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let res = "";
      for (let i = 0; i < 12; i++) {
        res += chars[Math.floor(Math.random() * chars.length)];
      }
      return res;
    }

    // 添加视频
    function addVideo(peerId, stream, label, isHostTag = false) {
      if (document.getElementById(`v-${peerId}`)) return;
      const card = document.createElement("div");
      card.className = "bg-gray-800 rounded-lg overflow-hidden relative video-card";
      card.id = `v-${peerId}`;

      const video = document.createElement("video");
      video.autoplay = true;
      video.playsInline = true;
      video.srcObject = stream;
      video.className = "w-full h-full object-cover";
      if (peerId === localPeerId) video.muted = true;

      const name = document.createElement("div");
      name.className = "absolute bottom-2 left-2 bg-black/50 px-2 py-0.5 text-xs rounded";
      name.textContent = label + (isHostTag ? " (主持人)" : "");

      card.appendChild(video);
      card.appendChild(name);
      videosEl.appendChild(card);
    }

    // 移除视频
    function removeVideo(peerId) {
      const el = document.getElementById(`v-${peerId}`);
      if (el) el.remove();
    }

    // 更新参会列表
    function updateUserList() {
      const listEl = document.getElementById("userList");
      const mobileList = document.getElementById("mobileList");
      listEl.innerHTML = "";
      mobileList.innerHTML = "";
      
      const count = userList.size;
      document.getElementById("userCount").textContent = count;
      document.getElementById("mobileCount").textContent = count;

      userList.forEach((info, id) => {
        const item = document.createElement("div");
        item.className = "flex justify-between items-center bg-gray-800 p-1.5 rounded text-xs";

        const nameSpan = document.createElement("span");
        nameSpan.textContent = info.name + (info.hand ? " ✋" : "");
        if (info.host) nameSpan.className = "text-primary font-bold";

        const btns = document.createElement("div");
        btns.className = "flex gap-1";

        if (isHost && id !== localPeerId) {
          const micBtn = document.createElement("button");
          micBtn.textContent = info.mic ? "禁麦" : "开麦";
          micBtn.className = "px-1 bg-primary/80 rounded";
          micBtn.onclick = () => sendControl(id, "mic", !info.mic);

          const camBtn = document.createElement("button");
          camBtn.textContent = info.cam ? "禁画" : "开画";
          camBtn.className = "px-1 bg-warning/80 rounded";
          camBtn.onclick = () => sendControl(id, "cam", !info.cam);

          const kickBtn = document.createElement("button");
          kickBtn.textContent = "踢出";
          kickBtn.className = "px-1 bg-danger/80 rounded";
          kickBtn.onclick = () => sendControl(id, "kick", true);

          btns.append(micBtn, camBtn, kickBtn);
        }

        item.append(nameSpan, btns);
        listEl.appendChild(item);
        mobileList.appendChild(item.cloneNode(true));
      });
    }

    // 主持人发送控制指令
    function sendControl(toId, type, value) {
      connections.forEach((conn) => {
        if (conn.peer === toId) {
          conn.send({ type: "control", target: toId, cmd: type, val: value });
        }
      });
    }

    // 发送聊天
    function sendChat() {
      const text = (document.getElementById("chatInput").value || document.getElementById("mobileInput").value).trim();
      if (!text || !roomKey) return;

      const data = {
        type: "chat",
        name: isHost ? "主持人" : "参会者",
        text: text,
      };
      
      connections.forEach((conn) => conn.send(data));
      addChat(data.name, data.text);
      addBarrage(data.text);
      
      document.getElementById("chatInput").value = "";
      document.getElementById("mobileInput").value = "";
    }

    // 添加聊天记录
    function addChat(name, text) {
      const div = document.createElement("div");
      div.innerHTML = `<span class="${name === "主持人" ? "text-primary" : "text-gray-300"}">${name}：</span>${text}`;
      chatBox.appendChild(div);
      document.getElementById("mobileChat").appendChild(div.cloneNode(true));
      chatBox.scrollTop = chatBox.scrollHeight;
      document.getElementById("mobileChat").scrollTop = document.getElementById("mobileChat").scrollHeight;
    }

    // 添加弹幕
    function addBarrage(text) {
      const bar = document.createElement("div");
      bar.className = "barrage absolute text-white text-sm px-2 py-1 bg-black/50 rounded-full";
      bar.textContent = text;
      bar.style.top = `${Math.random() * 80}%`;
      document.getElementById("barrageContainer").appendChild(bar);
      setTimeout(() => bar.remove(), 8000);
    }

    // 初始化白板
    function initBoard(canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");
      let drawing = false;
      
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      
      canvas.onmousedown = (e) => {
        drawing = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
      };
      
      canvas.onmousemove = (e) => {
        if (drawing) {
          ctx.lineTo(e.offsetX, e.offsetY);
          ctx.stroke();
        }
      };
      
      canvas.onmouseup = () => (drawing = false);
      return () => ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    const clearMainBoard = initBoard("whiteboard");
    const clearMobBoard = initBoard("mobileBoard");

    // ========== 媒体功能 ==========
    // 麦克风
    async function toggleMic() {
      try {
        if (!localStream) {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          localStream.getAudioTracks()[0].enabled = false;
        }
        
        const track = localStream.getAudioTracks()[0];
        track.enabled = !track.enabled;
        isMiced = track.enabled;
        
        document.getElementById("micBtn").style.background = isMiced ? "#00b42a" : "#374151";
        showToast(isMiced ? "麦克风已开启" : "麦克风已关闭");
        updateMyInfo();
      } catch (e) {
        showToast("麦克风权限被拒绝");
      }
    }

    // 摄像头
    async function toggleCamera() {
      try {
        if (!localStream) {
          localStream = await navigator.mediaDevices.getUserMedia({ video: true });
          localStream.getVideoTracks()[0].enabled = false;
        }

        const track = localStream.getVideoTracks()[0];
        track.enabled = !track.enabled;
        isCamered = track.enabled;

        document.getElementById("cameraBtn").style.background = isCamered ? "#00b42a" : "#374151";
        
        if (isCamered) addVideo(localPeerId, localStream, "我", isHost);
        else removeVideo(localPeerId);
        
        showToast(isCamered ? "摄像头已开启" : "摄像头已关闭");
        updateMyInfo();
      } catch (e) {
        showToast("摄像头权限被拒绝");
      }
    }

    // 屏幕共享
    async function toggleShare() {
      try {
        if (!shareStream) {
          shareStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          addVideo("share", shareStream, "屏幕共享");
          document.getElementById("shareBtn").style.background = "#00b42a";
          
          shareStream.oninactive = () => {
            removeVideo("share");
            shareStream = null;
            document.getElementById("shareBtn").style.background = "#374151";
          };
        } else {
          shareStream.getTracks().forEach((t) => t.stop());
          removeVideo("share");
          shareStream = null;
          document.getElementById("shareBtn").style.background = "#374151";
        }
      } catch (e) {
        showToast("屏幕共享失败");
      }
    }

    // 录制
    function toggleRecord() {
      if (!localStream) {
        showToast("请先开启摄像头或麦克风");
        return;
      }

      if (!isRecording) {
        mediaRecorder = new MediaRecorder(localStream);
        const chunks = [];
        
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: "video/webm" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `会议录制_${new Date().getTime()}.webm`;
          a.click();
        };
        
        mediaRecorder.start();
        isRecording = true;
        document.getElementById("recordBtn").style.background = "#f53f3f";
        showToast("开始录制");
      } else {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById("recordBtn").style.background = "#374151";
        showToast("录制完成，已自动下载");
      }
    }

    // 举手
    function toggleHand() {
      isHandUp = !isHandUp;
      document.getElementById("handBtn").style.background = isHandUp ? "#ff7d00" : "#374151";
      showToast(isHandUp ? "已举手" : "取消举手");
      updateMyInfo();
    }

    // 更新个人状态
    function updateMyInfo() {
      userList.set(localPeerId, {
        name: isHost ? "主持人" : "参会者",
        host: isHost,
        mic: isMiced,
        cam: isCamered,
        hand: isHandUp,
      });
      updateUserList();
      connections.forEach((conn) => conn.send({ type: "info", list: userList }));
    }

    // ========== 会议核心 ==========
    // 创建会议
    async function createRoom() {
      isHost = true;
      roomKey = generateRoomKey();
      
      document.getElementById("roomKey").textContent = roomKey;
      document.getElementById("userRole").textContent = "主持人";
      QRCode.toCanvas(document.getElementById("qrcodeContainer"), roomKey, { width: 64 });

      peer = new Peer(roomKey);
      peer.on("open", (id) => {
        localPeerId = id;
        userList.set(id, { name: "主持人", host: true, mic: false, cam: false, hand: false });
        updateUserList();
        
        document.getElementById("home").classList.add("hidden");
        document.getElementById("room").classList.remove("hidden");
        showToast("会议创建成功");
      });

      peer.on("connection", (conn) => {
        conn.on("open", () => {
          connections.set(conn.peer, conn);
          
          conn.on("data", (data) => {
            if (data.type === "join") {
              userList.set(data.peerId, { name: "参会者", host: false, mic: false, cam: false, hand: false });
              updateUserList();
              connections.forEach((c) => c.send({ type: "list", list: userList }));
            }
            if (data.type === "chat") {
              addChat(data.name, data.text);
              addBarrage(data.text);
            }
            if (data.type === "info") updateUserList();
          });
        });
      });
    }

    // 加入会议
    async function joinRoom(inputKey) {
      if (inputKey.length !== 12 || inputKey !== roomKey) {
        showToast("密钥错误，区分大小写，无法入会");
        return;
      }

      isHost = false;
      document.getElementById("roomKey").textContent = roomKey;
      document.getElementById("userRole").textContent = "参会者";
      QRCode.toCanvas(document.getElementById("qrcodeContainer"), roomKey, { width: 64 });

      peer = new Peer();
      peer.on("open", (id) => {
        localPeerId = id;
        const conn = peer.connect(roomKey);
        
        conn.on("open", () => {
          connections.set(roomKey, conn);
          conn.send({ type: "join", peerId: id });
          
          document.getElementById("joinModal").classList.add("hidden");
          document.getElementById("home").classList.add("hidden");
          document.getElementById("room").classList.remove("hidden");
          showToast("成功加入会议");
        });

        conn.on("data", (data) => {
          if (data.type === "list") {
            userList.clear();
            data.list.forEach((v, k) => userList.set(k, v));
            updateUserList();
          }
          if (data.type === "chat") {
            addChat(data.name, data.text);
            addBarrage(data.text);
          }
          if (data.type === "control") {
            if (data.cmd === "mic" && localStream) {
              localStream.getAudioTracks()[0].enabled = data.val;
              isMiced = data.val;
              document.getElementById("micBtn").style.background = isMiced ? "#00b42a" : "#374151";
            }
            if (data.cmd === "cam" && localStream) {
              localStream.getVideoTracks()[0].enabled = data.val;
              isCamered = data.val;
              isCamered ? addVideo(localPeerId, localStream, "我") : removeVideo(localPeerId);
              document.getElementById("cameraBtn").style.background = isCamered ? "#00b42a" : "#374151";
            }
            if (data.cmd === "kick") {
              leaveRoom();
              showToast("你已被主持人踢出会议");
            }
          }
        });
      });
    }

    // 离开会议
    function leaveRoom() {
      if (peer) peer.destroy();
      if (localStream) localStream.getTracks().forEach((t) => t.stop());
      if (shareStream) shareStream.getTracks().forEach((t) => t.stop());
      window.location.reload();
    }

    // ========== 事件绑定 ==========
    document.getElementById("createBtn").onclick = createRoom;
    document.getElementById("joinBtn").onclick = () => document.getElementById("joinModal").classList.remove("hidden");
    document.getElementById("cancelJoin").onclick = () => document.getElementById("joinModal").classList.add("hidden");
    document.getElementById("confirmJoin").onclick = () => joinRoom(document.getElementById("joinKey").value.trim());
    
    document.getElementById("leaveBtn").onclick = leaveRoom;
    document.getElementById("copyKey").onclick = () => {
      navigator.clipboard.writeText(roomKey);
      showToast("密钥已复制");
    };

    // 控制按钮
    document.getElementById("micBtn").onclick = toggleMic;
    document.getElementById("cameraBtn").onclick = toggleCamera;
    document.getElementById("shareBtn").onclick = toggleShare;
    document.getElementById("recordBtn").onclick = toggleRecord;
    document.getElementById("handBtn").onclick = toggleHand;

    // 聊天
    document.getElementById("sendChat").onclick = sendChat;
    document.getElementById("mobileSend").onclick = sendChat;

    // 白板
    document.getElementById("clearBoard").onclick = clearMainBoard;
    document.getElementById("clearMobile").onclick = clearMobBoard;

    // 移动端侧边栏
    document.getElementById("sideToggle").onclick = () => mobileSide.classList.remove("translate-x-full");
    document.getElementById("closeMobile").onclick = () => mobileSide.classList.add("translate-x-full");

    // 课件上传（仅本地预览）
    document.getElementById("uploadFile").onchange = (e) => {
      if (e.target.files.length > 0) showToast("课件已上传：" + e.target.files[0].name);
    };
    document.getElementById("mobileUpload").onchange = (e) => {
      if (e.target.files.length > 0) showToast("课件已上传：" + e.target.files[0].name);
    };
  </script>
</body>
</html>
